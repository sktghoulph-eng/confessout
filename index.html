<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confessout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="overlay">
            <h1>Hi! This is Confessout</h1>
            <h2>Anonymous Messaging</h2>

            <div class="buttons">
                <button class="signup">
                   
                   <a href="Signup.html">Signup Now</a> 

                </button>
                
                <button class="login">

                    <a href="login.html">Login</a>


                </button>
            </div>
        </div>
    </section>

    <!-- ICON SECTION -->
    <section class="features">

        <div class="feature">
            <div class="circle blue">✈</div>
            <p>Send</p>
        </div>

        <div class="feature">
            <div class="circle green">✉</div>
            <p>Receive</p>
        </div>

        <div class="feature">
            <div class="circle red">↩</div>
            <p>Reply</p>
        </div>

    </section>

</body>
</html>
