<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confessout</title>

  <link rel="stylesheet" href="profile.css" />

  <!-- ICONS -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="header">

    <div class="overlay"></div>

    <h1 class="logo">Confessout</h1>

    <div class="settings">
      <i class="fa-solid fa-gear"></i>
    </div>

  </header>

  <!-- WHITE CARD -->
  <section class="card">

    <h2>Hey, Lester</h2>

    <p class="text">
      Here is your public link:
    </p>

    <a href="sendmessage.html">Https://www.confessout.com//Lester</a>
    


  </section>

  <!-- BUTTONS -->
  <section class="buttons">

    <!-- RECEIVED -->
    <div class="item">

      <div class="circle green">
        <i class="fa-regular fa-envelope"></i>
      </div>

      <p>
        <a href="messages.html">View Received</a> 
      </p>

    </div>
    <div class="settings-btn">
  
  <span class="custom-text">
    <a href="profilesettingbutton.html">rawr</a> 

  </span>
  
</div>


    <!-- SEND -->
    <div class="item">

      <div class="circle blue">
        <i class="fa-regular fa-paper-plane"></i>
      </div>

      <p>View Send</p>

    </div>

  </section>

</body>
</html>
